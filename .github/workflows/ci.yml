name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check .
          black --check .

      - name: Run smoke tests
        env:
          PYTHONPATH: .
        run: |
          python -m compileall api m5_pipeline monitoring analytics_sql agents worker tests
          pytest -q

      - name: Validate Docker Compose config
        run: |
          docker compose config
