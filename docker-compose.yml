services:
  redis:
    image: redis:7-alpine
    container_name: m5_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    image: sql-forecasting-api:latest
    container_name: m5_fastapi_service
    ports:
      - "8000:8000"
    environment:
      DATA_ROOT: /app/data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENABLE_SYNC_ENDPOINTS: "false"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    image: sql-forecasting-api:latest
    container_name: m5_celery_worker
    command: ["celery", "-A", "worker.celery_app.celery_app", "worker", "--loglevel=INFO"]
    environment:
      DATA_ROOT: /app/data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      app:
        condition: service_healthy
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    ports:
      - "9093:9093"
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana_data:
