route:
  receiver: slack-notifications
  group_by: ["alertname"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: slack-notifications
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/ME"
        channel: "#alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"
